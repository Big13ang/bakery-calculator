name: Build Android (APK + AAB)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Install dependencies
        run: npm ci

      - name: Cache Expo prebuild output
        id: prebuild-cache
        uses: actions/cache@v4
        with:
          path: android
          key: prebuild-${{ hashFiles('package.json', 'package-lock.json', 'app.config.ts', 'eas.json') }}

      - name: Generate Android Native Project (Prebuild)
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --clean

      - name: Build Android Release APK + AAB
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease \
            --build-cache \
            --parallel \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.enablePngCrunchInReleaseBuilds=false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amoo-ghanad-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amoo-ghanad-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
