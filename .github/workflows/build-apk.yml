name: Build Android (APK + AAB)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache node_modules
        id: node-cache-lint
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.node-cache-lint.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  build:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Cache Expo prebuild output
        id: prebuild-cache
        uses: actions/cache@v4
        with:
          path: android
          key: prebuild-${{ hashFiles('package.json', 'bun.lock', 'app.config.ts', 'eas.json') }}

      - name: Generate Android Native Project (Prebuild)
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        run: bunx expo prebuild --platform android --clean --non-interactive

      - name: Build Android Release APK + AAB
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease \
            --build-cache \
            --parallel \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.enablePngCrunchInReleaseBuilds=false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amoo-ghanad-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amoo-ghanad-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
