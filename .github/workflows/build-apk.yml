name: Build Android (AAB)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun packages
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  build:
    name: Build Android (AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success

      - name: Cache Bun packages
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache C++ object files for reanimated/gesture-handler CMake builds.
      # compiler_check=content avoids false misses on ephemeral runners where
      # the compiler binary path/mtime differs between machines.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: ccache-${{ runner.os }}-
          max-size: 2G

      - name: Configure ccache
        run: ccache --set-config=compiler_check=content

      - name: Cache Expo prebuild output
        id: prebuild-cache
        uses: actions/cache@v6
        with:
          path: android
          key: >-
            ${{ runner.os }}-expo-android-${{
              hashFiles(
                'package.json',
                'bun.lock',
                'app.config.*',
                'eas.json',
                'plugins/**',
                'patches/**'
              )
            }}

      - name: Generate Android native project
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        run: bunx expo prebuild --platform android --clean --non-interactive

      - name: Build Android release APK and AAB
        working-directory: android
        env:
          NDK_CCACHE: ccache
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx6g
            -XX:MaxMetaspaceSize=1g
            -XX:+UseParallelGC
            -XX:+HeapDumpOnOutOfMemoryError
        run: |
          ./gradlew \
            :app:bundleRelease \
            --build-cache \
            --parallel \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.enablePngCrunchInReleaseBuilds=false

      - name: Show ccache statistics
        if: always()
        run: ccache --show-stats

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: amoo-ghanad-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
