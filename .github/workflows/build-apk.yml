name: Build Android (AAB)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun packages
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  build:
    name: Build Android (AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Build AABs only for pushes to master/main or manual runs.
    # Pull requests run lint only.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'

    env:
      # Route native C/C++ compiles through ccache. The Android NDK's CMake
      # toolchain reads NDK_CCACHE and wires `ccache` in as the compiler
      # launcher, so this covers both New-Architecture CMake builds and any
      # legacy ndk-build modules.
      NDK_CCACHE: ccache
      # Make ccache hits survive `expo prebuild` regeneration. prebuild rewrites
      # the native tree with fresh paths/timestamps; these settings hash file
      # *content* (not mtimes or absolute dirs) so unchanged sources still hit.
      CCACHE_COMPILERCHECK: content
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_NOHASHDIR: "true"
      CCACHE_SLOPPINESS: time_macros,include_file_mtime,include_file_ctime,file_stat_matches,system_headers,pch_defines

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      # Caches the Gradle User Home: downloaded dependencies, the wrapper, and
      # the local build cache (~/.gradle/caches/build-cache-1) that lets task
      # outputs (incl. compiled .so) be reused across runs.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-cleanup: on-success

      - name: Cache Bun packages
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-
          max-size: 3G

      - name: Configure ccache
        run: |
          ccache --zero-stats
          ccache --show-config | grep -E 'compiler_check|sloppiness|base_dir|hash_dir|max_size' || true

      # ----------------------------------------------------------------------
      # Prebuild (android/) output cache  --  the biggest win.
      #
      # The generated android/ folder is a pure function of the Expo config,
      # the dependency set, and the app assets. By caching it:
      #   * cache HIT  -> skip `expo prebuild` entirely AND hand Gradle the
      #                   byte-identical input files it saw last time, so
      #                   Gradle's build cache HITS instead of re-running tasks.
      #   * cache MISS -> regenerate, then save the *pristine* android/ here,
      #                   before Gradle creates any build outputs.
      #
      # Exact-key only (no restore-keys) so a stale folder can never be reused.
      # Bump the `-v1-` salt to force a clean regeneration if ever needed.
      # ----------------------------------------------------------------------
      - name: Restore prebuild (android/) cache
        id: prebuild-cache
        uses: actions/cache/restore@v6
        with:
          path: android
          key: prebuild-android-v1-${{ hashFiles('app.config.ts', 'package.json', 'bun.lock', 'src/assets/**') }}

      - name: Generate Android native project
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        env:
          CI: 1
          NODE_ENV: production
        run: bunx expo prebuild --platform android --clean

      - name: Save prebuild (android/) cache
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: android
          key: ${{ steps.prebuild-cache.outputs.cache-primary-key }}

      - name: Build Android release AAB
        working-directory: android
        env:
          CI: 1
          NODE_ENV: production
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx6g
            -XX:MaxMetaspaceSize=1g
            -XX:+UseParallelGC
            -XX:+HeapDumpOnOutOfMemoryError
            -Dfile.encoding=UTF-8
        run: |
          ./gradlew \
            :app:bundleRelease \
            --build-cache \
            --parallel \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.enablePngCrunchInReleaseBuilds=false

      - name: Show ccache statistics
        if: always()
        run: ccache --show-stats --verbose || ccache --show-stats

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: amoo-ghanad-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
